name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  plugin-validate:
    name: claude plugin validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: claude plugin validate .
        run: claude plugin validate .

  validators:
    name: Local validator scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Smoke-test the validators against the vanilla template
        shell: bash
        run: |
          set -euo pipefail
          TEMPLATE_DIR=skills/extension-architect/templates/vanilla
          export WORK="$(mktemp -d)"
          cp -r "$TEMPLATE_DIR" "$WORK/dummy"
          mkdir -p "$WORK/dummy/icons"
          # Generate 1x1 placeholder PNGs so file-existence + icon checks pass
          python3 - <<'PY'
          import base64, os, pathlib
          PNG = base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=')
          for s in (16, 32, 48, 128):
              (pathlib.Path(os.environ['WORK']) / 'dummy' / 'icons' / f'{s}.png').write_bytes(PNG)
          PY
          python3 skills/extension-architect/scripts/validate-manifest.py "$WORK/dummy/manifest.json"
          bash    skills/extension-security/scripts/validate-csp.sh        "$WORK/dummy/manifest.json"
          python3 skills/extension-security/scripts/validate-permissions.py "$WORK/dummy/manifest.json"
          bash    skills/extension-publishing/scripts/check-store-readiness.sh "$WORK/dummy"
          bash    skills/extension-i18n/references/check-i18n.sh           "$WORK/dummy"

  plugin-install:
    name: claude plugin install (runtime truth)
    runs-on: ubuntu-latest
    # `claude plugin validate` checks a small subset of the schemas the runtime
    # loader actually enforces (see anthropics/claude-code#60725). Running the
    # real install catches the manifest-rejection failures `validate` misses —
    # e.g. `userConfig.*.enum` and `hooks/hooks.json` without the outer
    # `hooks` wrapper, both of which slipped past validate on this plugin
    # before they were caught by users at install time.
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Add workspace as a local marketplace
        run: |
          set -e
          claude plugin marketplace add "$GITHUB_WORKSPACE"

      - name: Install plugin and assert success
        shell: bash
        run: |
          set -e
          OUT=$(claude plugin install \
            chrome-extension-builder@chrome-extension-builder-marketplace \
            --scope local 2>&1)
          echo "$OUT"
          # `claude plugin install` exits 0 even on manifest-rejection; check
          # the output explicitly. Anchor on both possible failure markers.
          if echo "$OUT" | grep -qE "Failed to install|invalid manifest|Unrecognized key"; then
            echo "::error::claude plugin install reported a failure"
            exit 1
          fi
          if ! echo "$OUT" | grep -q "Successfully installed"; then
            echo "::error::no 'Successfully installed' marker in output"
            exit 1
          fi

  shell-syntax:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          # ShellCheck is preinstalled on ubuntu-latest. Audit every bundled .sh.
          find . -name "*.sh" -not -path "./node_modules/*" -print0 \
            | xargs -0 shellcheck --severity=warning

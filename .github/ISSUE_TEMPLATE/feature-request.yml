name: Feature request
description: A capability the plugin should have — new surface, validator check, framework support.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Read the README's **Non-goals** first — requests inside that scope will
        be closed. Everything else is fair game.

  - type: checkboxes
    id: area
    attributes:
      label: Area
      options:
        - label: Scaffolding (/chrome-ext:new, templates)
        - label: Validation (manifest / permissions / CSP / store-readiness)
        - label: Feature-add (/chrome-ext:add-feature surfaces)
        - label: Publishing (/chrome-ext:publish, store prep)
        - label: Migration (/chrome-ext:migrate-mv2)
        - label: Testing (Playwright harness, web-ext)
        - label: Framework support (WXT / Plasmo / CRXJS / other)
        - label: Docs / skills content

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow pain, not just the feature. Real examples beat hypotheticals.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should the plugin do? Sketch the command/output if you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: What do you do today instead?
